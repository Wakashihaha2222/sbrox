name: Atlantis Stock Bot (backup check)

on:
  schedule:
    - cron: "*/5 * * * *"   # Chạy mỗi 5 phút - đây chỉ là lớp dự phòng, bot chính chạy trên Termux
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run single check
        env:
          ATLANTIS_API_KEY: ${{ secrets.ATLANTIS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PRICE_LIMIT: "118000"
          RUN_ONCE: "true"
        run: python check.py

      - name: Commit stock.json
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add stock.json
          git diff --cached --quiet || git commit -m "Update stock state"
          git push
          
